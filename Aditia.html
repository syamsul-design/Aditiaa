<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kartu Profil</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      width: 300px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      text-align: center;
      padding: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 40px rgba(0,0,0,1);
    }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ffffff;
      margin-top: -50px;
      background: #333;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    .info {
      text-align: left;
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.6;
    }

    .info span {
      font-weight: bold;
      color: #bbb;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="https://via.placeholder.com/100" alt="Foto Profil" class="profile-img">

  <div class="name">RISKI ADITIA</div>

  <div class="info">
    <p><span>TTL:</span> 10 Agustus 2008</p>
    <p><span>Hobi:</span> Bermain Sepak Bola</p>
    <p><span>Alamat:</span> Cipari</p>
    <p><span>Agama:</span> Islam</p>
    <p><span>Sekolah:</span> SMK Komputama Majenang</p>
  </div>

  <div class="footer">Profile Card</div>
</div>

</body>
</html>
